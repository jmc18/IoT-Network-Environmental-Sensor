# IoT Network Backend - Docker Compose (like A_PG)
# Usage: docker compose up -d --build
# Functions API: http://localhost:7071
# Cosmos Data Explorer: https://localhost:8081
# Azurite Blob: http://localhost:10000

services:
  iot.functions:
    image: ${DOCKER_REGISTRY-}iot-network-functions
    build:
      context: .
      dockerfile: IoTBackend/Functions/Dockerfile
    container_name: iot-network-functions
    ports:
      - "7071:80"
    depends_on:
      - cosmosdb
      - azurite
    environment:
      AzureWebJobsStorage: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;QueueEndpoint=http://azurite:10001/devstoreaccount1;TableEndpoint=http://azurite:10002/devstoreaccount1;"
      CosmosDb__ConnectionString: "AccountEndpoint=https://cosmosdb:8081/;AccountKey=C2y6yDjf5/R+ob0N8A7Cgv30VRDJIWEHLM+4QDU5DE2nQ9nDuVTqobD4b8mGGyPMbIZnqyMsEcaGQy67XIw/Jw==;DisableServerCertificateValidation=True;"
      IOT_INGEST_API_KEY: "dev-api-key-change-in-production"
      FUNCTIONS_WORKER_RUNTIME: "dotnet-isolated"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  cosmosdb:
    image: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:latest
    container_name: azure-cosmosdb-emulator
    hostname: cosmosdb
    restart: unless-stopped
    mem_limit: 4GB
    tty: true
    ports:
      - "8081:8081"
      - "8900:8900"
      - "8901:8901"
      - "8902:8902"
      - "10250:10250"
      - "10251:10251"
      - "10252:10252"
      - "10253:10253"
      - "10254:10254"
      - "10255:10255"
      - "10256:10256"
      - "10350:10350"
    environment:
      AZURE_COSMOS_EMULATOR_PARTITION_COUNT: "3"
      AZURE_COSMOS_EMULATOR_ENABLE_DATA_PERSISTENCE: "false"
      AZURE_COSMOS_EMULATOR_IP_ADDRESS_OVERRIDE: "172.16.238.2"

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: azurite
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    volumes:
      - azurite-data:/data
    command: "azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0"

volumes:
  azurite-data:
