# Docs for the Azure Web Apps Deploy action: https://github.com/azure/functions-action
# Configure these Application Settings in Azure Portal (Function App > Configuration):
# - CosmosDb__ConnectionString (or COSMOS_CONNECTION_STRING)
# - IOT_INGEST_API_KEY
# - AzureSignalRConnectionString (for real-time maps)

name: Build and deploy .NET IoT Backend to Azure Function App

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'
  AZURE_FUNCTIONAPP_NAME: 'IoT-Network-Environmental-Sensor'
  PROJECT_PATH: 'IoTBackend/Functions'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}/Functions.csproj

      - name: Build
        run: dotnet build ${{ env.PROJECT_PATH }}/Functions.csproj --no-restore -c Release

      - name: Publish
        run: dotnet publish ${{ env.PROJECT_PATH }}/Functions.csproj -c Release -o ./publish --no-build

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-app
          path: ./publish

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: dotnet-app

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        id: fa
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          slot-name: 'Production'
          package: ./dotnet-app
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_76945D52BC7545F0A6B907DC9ACEF0E2 }}
          sku: 'flexconsumption'
