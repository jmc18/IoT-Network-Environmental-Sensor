# Build & deploy de la PWA Blazor WebAssembly al App Service Windows iot-mci-app.
# dotnet publish genera un web.config en la raíz que hace rewrite a un subfolder
# `wwwroot\...` donde están los archivos reales. Por eso se despliega la salida
# completa de publish SIN aplanar: el web.config queda como raíz del sitio y
# los estáticos en el subfolder `wwwroot/`.

name: Build and deploy Blazor PWA to Azure Web App - iot-mci-app

on:
  push:
    branches:
      - main
    paths:
      - 'src/IoTNetwork.Pwa/**'
      - 'src/IoTNetwork.Core/**'
      - '.github/workflows/main_iot-mci-app.yml'
  workflow_dispatch:

env:
  # Opta a Node 24 ya para evitar el warning de deprecación de Node 20
  # en actions/download-artifact@v4 y azure/login@v2.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Set up Node.js (Tailwind CLI)
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/IoTNetwork.Pwa/package-lock.json

      - name: Install Tailwind dependencies
        working-directory: src/IoTNetwork.Pwa
        run: npm ci

      - name: dotnet publish PWA
        shell: pwsh
        run: |
          dotnet publish src/IoTNetwork.Pwa/IoTNetwork.Pwa.csproj `
            -c Release `
            -o "${{ env.DOTNET_ROOT }}\myapp"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: pwa-package
          path: ${{ env.DOTNET_ROOT }}\myapp

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: pwa-package
          path: ./publish

      - name: Zip publish output
        shell: pwsh
        run: |
          Compress-Archive -Path .\publish\* -DestinationPath .\pwa-package.zip -Force

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_FD08F017D7F542AEBE0D93B1FD39A7E8 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_826F57E7C770430798F745ECBE30BE07 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_C4432835030F4CD381172EF0716F691C }}

      - name: Deploy to Azure Web App (clean wwwroot)
        id: deploy-to-webapp
        shell: pwsh
        run: |
          $rg = az webapp list --query "[?name=='iot-mci-app'].resourceGroup | [0]" -o tsv
          if (-not $rg) { throw "No se encontró el resource group del App Service 'iot-mci-app'." }
          Write-Host "Resource group detectado: $rg"

          az webapp deploy `
            --resource-group $rg `
            --name iot-mci-app `
            --slot Production `
            --src-path .\pwa-package.zip `
            --type zip `
            --clean true `
            --restart true
