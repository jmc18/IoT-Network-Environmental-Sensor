name: Build and deploy ASP.Net Core app to Azure Web App - iot-mci-itc

on:
  push:
    branches:
      - main
    paths:
      - 'src/IoTNetwork.Api/**'
      - 'src/IoTNetwork.Core/**'
      - 'src/IoTNetwork.Infrastructure/**'
      - '.github/workflows/main_iot-mci-itc.yml'
  workflow_dispatch:

env:
  # Opta a Node 24 ya para evitar el warning de deprecación de Node 20
  # en actions/download-artifact@v4 y azure/login@v2.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Publish API (linux-x64 framework-dependent)
        run: |
          dotnet publish src/IoTNetwork.Api/IoTNetwork.Api.csproj \
            -c Release \
            -r linux-x64 \
            --self-contained false \
            -o ${{ env.DOTNET_ROOT }}/myapp

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{ env.DOTNET_ROOT }}/myapp

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_7BFA74F654F84350924A4C7E17967D2B }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_D47D551452D64D808FD4CEBE385FC2E1 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_65414D82B26143E4AC4DD2A0188C0820 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: "iot-mci-itc"
          slot-name: "Production"
          package: .
