# Build & deploy de la API .NET (IoTNetwork.Api) al App Service Windows iot-mci-api.
# Publicamos framework-dependent para que lo ejecute el AspNetCoreModuleV2 de IIS
# con el runtime .NET 10 que ya tiene el App Service, generando el web.config
# con el hosting correspondiente.

name: Build and deploy ASP.Net Core app to Azure Web App - iot-mci-api

on:
  push:
    branches:
      - main
    paths:
      - 'src/IoTNetwork.Api/**'
      - 'src/IoTNetwork.Core/**'
      - 'src/IoTNetwork.Infrastructure/**'
      - '.github/workflows/main_iot-mci-api.yml'
  workflow_dispatch:

env:
  # Opta a Node 24 ya para evitar el warning de deprecación de Node 20
  # en actions/download-artifact@v4 y azure/login@v2.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: dotnet publish API (framework-dependent, win-x64)
        shell: pwsh
        run: |
          dotnet publish src/IoTNetwork.Api/IoTNetwork.Api.csproj `
            -c Release `
            -r win-x64 `
            --self-contained false `
            -o "${{ env.DOTNET_ROOT }}\myapp"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: api-package
          path: ${{ env.DOTNET_ROOT }}\myapp

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: api-package

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_4BAFC4D0A6B54CFAB1DE4AA3CF41677B }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_9C628E0C0B374C07BE20C2A83AF7BB8A }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_8C4BC442A9684C5684F0E5084BFD14BE }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'iot-mci-api'
          slot-name: 'Production'
          package: .
