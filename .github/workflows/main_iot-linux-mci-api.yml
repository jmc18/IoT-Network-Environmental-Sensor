# Build & deploy de la API .NET (IoTNetwork.Api) al App Service Linux iot-linux-mci-api.
# Publicamos self-contained linux-x64: el runtime .NET viaja dentro del paquete,
# así evitamos depender de la versión de .NET instalada en el stack del App
# Service Linux.
#
# A diferencia del workflow de Windows (OIDC + az webapp deploy), este usa el
# publish profile existente y el endpoint Kudu /api/zipdeploy?clean=true, que
# borra el wwwroot antes de extraer el ZIP nuevo (equivalente a --clean true).

name: Build and deploy ASP.Net Core app to Azure Web App - iot-linux-mci-api

on:
  push:
    branches:
      - main
    paths:
      - 'src/IoTNetwork.Api/**'
      - 'src/IoTNetwork.Core/**'
      - 'src/IoTNetwork.Infrastructure/**'
      - '.github/workflows/main_iot-linux-mci-api.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: dotnet publish API (self-contained, linux-x64)
        run: |
          dotnet publish src/IoTNetwork.Api/IoTNetwork.Api.csproj \
            -c Release \
            -r linux-x64 \
            --self-contained true \
            -p:PublishReadyToRun=true \
            -o "${{ env.DOTNET_ROOT }}/myapp"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: linux-api-package
          path: ${{ env.DOTNET_ROOT }}/myapp

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: linux-api-package
          path: ./publish

      - name: Zip publish output
        run: |
          cd ./publish
          zip -r ../linux-api-package.zip .
          cd ..
          ls -lh linux-api-package.zip

      - name: Deploy to Azure Web App (clean wwwroot via Kudu)
        id: deploy-to-webapp
        env:
          PUBLISH_PROFILE: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_D396F023628244FD95EFFF4326D6E9B5 }}
          APP_NAME: iot-linux-mci-api
        run: |
          set -euo pipefail

          # Extraemos credenciales SCM (ZipDeploy/MSDeploy) del publish profile.
          USER=$(echo "$PUBLISH_PROFILE" | grep -oP 'publishMethod="MSDeploy"[^>]*userName="\K[^"]+' | head -n1)
          PASS=$(echo "$PUBLISH_PROFILE" | grep -oP 'publishMethod="MSDeploy"[^>]*userPWD="\K[^"]+' | head -n1)

          if [ -z "$USER" ] || [ -z "$PASS" ]; then
            echo "No pude extraer credenciales del publish profile." >&2
            exit 1
          fi

          SCM_URL="https://${APP_NAME}.scm.azurewebsites.net/api/zipdeploy?clean=true&async=false"
          echo "Desplegando a $SCM_URL ..."

          HTTP_CODE=$(curl -sS -o deploy.log -w "%{http_code}" \
            -X POST "$SCM_URL" \
            -u "$USER:$PASS" \
            -H "Content-Type: application/zip" \
            --data-binary @linux-api-package.zip)

          echo "HTTP $HTTP_CODE"
          cat deploy.log || true

          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "202" ]; then
            echo "Deploy falló con código $HTTP_CODE" >&2
            exit 1
          fi
