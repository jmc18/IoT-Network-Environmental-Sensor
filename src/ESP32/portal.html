<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ESP32 Setup</title><style>:root{--card:#121933;--txt:#e7ecff;--muted:#9aa7cf;--pri:#3b82f6}*{box-sizing:border-box}body{font-family:system-ui,Segoe UI,Arial,sans-serif;margin:0;background:linear-gradient(140deg,#0b1020,#111a3d);color:var(--txt)}.box{max-width:560px;margin:18px auto;padding:14px}.head{display:flex;align-items:center;gap:10px}.badge{width:44px;height:44px;border-radius:10px;display:grid;place-items:center;background:linear-gradient(135deg,#2563eb,#06b6d4);font-weight:800}.card{background:var(--card);padding:12px;border-radius:12px;margin:10px 0;border:1px solid #27325d}.muted{color:var(--muted);font-size:13px}label{font-size:13px;color:var(--muted)}input,select,button{width:100%;margin:7px 0;padding:11px;border-radius:9px;border:1px solid #2f3d73;background:#0d1430;color:#fff}button{background:var(--pri);border:0;font-weight:700}.btn2{background:#1e293b}.row{display:flex;gap:8px}.row>*{flex:1}pre{white-space:pre-wrap;background:#060914;padding:10px;border-radius:8px;max-height:170px;overflow:auto;border:1px solid #1d2b59}</style></head><body><div class="box"><div class="head"><div class="badge">IoT</div><h2 style="margin:0">Configurar ESP32</h2></div><div class="card"><b>Red:</b> {{AP_SSID}}<br><b>IP:</b> {{AP_IP}}<br><span class="muted">{{AP_AUTH_HINT}}</span></div><form id="f"><label>WiFi</label><select id="ssidSelect" name="ssid"><option value="">Selecciona red</option>{{SSID_OPTIONS}}</select><button class="btn2" id="scanBtn" type="button">Buscar redes</button><input name="ssid_manual" placeholder="o escribe SSID manual"><div class="row"><input id="pwd" name="password" type="password" placeholder="Contraseña WiFi"><button class="btn2" id="t" type="button">Mostrar</button></div><input name="node_id" placeholder="Node ID ej. esp32-aula-1" required><div class="row"><input name="latitude" placeholder="Latitud" required><input name="longitude" placeholder="Longitud" required></div><button>Guardar y conectar</button></form><div class="card"><b>Estado</b><pre id="st">Esperando...</pre><div class="row"><button class="btn2" onclick="post('/reboot');return false">Reiniciar</button><button class="btn2" onclick="post('/factory-reset');return false">Factory reset</button></div></div></div><script>function data(){let f=document.getElementById('f'),d=new URLSearchParams(new FormData(f));if(d.get('ssid_manual'))d.set('ssid',d.get('ssid_manual'));return d}async function post(u,b){let r=await fetch(u,{method:'POST',body:b||''});document.getElementById('st').textContent=await r.text()}document.getElementById('f').onsubmit=e=>{e.preventDefault();post('/save',data())};document.getElementById('t').onclick=()=>{let p=document.getElementById('pwd');let s=p.type==='password';p.type=s?'text':'password';document.getElementById('t').textContent=s?'Ocultar':'Mostrar'};document.getElementById('scanBtn').onclick=async()=>{let st=document.getElementById('st');st.textContent='Buscando redes...';try{let r=await fetch('/scan');let j=await r.json();let sel=document.getElementById('ssidSelect');let prev=sel.value;sel.innerHTML='<option value=\"\">Selecciona red</option>';(j.ssids||[]).forEach(s=>{let o=document.createElement('option');o.value=s;o.textContent=s;sel.appendChild(o)});if(prev)sel.value=prev;st.textContent=(j.ok?'Escaneo OK. ':'Escaneo con errores. ')+'Redes: '+(j.ssids||[]).length}catch(e){st.textContent='Fallo al buscar redes'}};async function status(){try{let r=await fetch('/status');document.getElementById('st').textContent=JSON.stringify(await r.json(),null,2)}catch(e){}}setInterval(status,5000);status();</script></body></html>
