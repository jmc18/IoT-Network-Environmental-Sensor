<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ESP32 Admin</title><style>:root{--card:#121933;--txt:#e7ecff;--muted:#9aa7cf;--pri:#3b82f6}*{box-sizing:border-box}body{font-family:system-ui,Segoe UI,Arial,sans-serif;margin:0;background:linear-gradient(140deg,#0b1020,#111a3d);color:var(--txt)}.box{max-width:560px;margin:18px auto;padding:14px}.head{display:flex;align-items:center;gap:10px}.badge{width:44px;height:44px;border-radius:10px;display:grid;place-items:center;background:linear-gradient(135deg,#2563eb,#06b6d4);font-weight:800}.card{background:var(--card);padding:12px;border-radius:12px;margin:10px 0;border:1px solid #27325d}.muted{color:var(--muted);font-size:13px}a{display:block;margin:8px 0;color:#93c5fd;text-decoration:none}a:hover{text-decoration:underline}button{width:100%;margin:7px 0;padding:11px;border-radius:9px;border:0;background:var(--pri);color:#fff;font-weight:700}.btn2{background:#1e293b}</style></head><body><div class="box"><div class="head"><div class="badge">IoT</div><h2 style="margin:0">ESP32 Admin</h2></div><div class="card"><p><b>IP:</b> __IP__</p><p><b>Node:</b> __NODE__</p><p><b>WiFi:</b> __WIFI__</p><p><b>Evento:</b> __EV__</p><p><b>RAM:</b> __MEM__</p></div><div class="card"><a href="/status">Ver estado</a><a href="/logs">Ver logs</a><a href="/config">Ver configuración</a></div><form method="post" action="/reboot"><button>Reiniciar</button></form><form method="post" action="/factory-reset"><button class="btn2">Factory reset</button></form><form method="post" action="/portal-force"><button class="btn2">Forzar portal en próximo arranque</button></form></div></body></html>
