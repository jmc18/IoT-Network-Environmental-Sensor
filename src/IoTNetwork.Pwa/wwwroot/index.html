<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f8fafc" media="(prefers-color-scheme: light)" />
    <title>Red IoT escolar — ITCelaya</title>
    <base href="/" />
    <script>
        (function () {
            try {
                var t = localStorage.getItem('iot-theme');
                if (t === 'dark' || (t !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches))
                    document.documentElement.classList.add('dark');
            } catch (e) { }
        })();
    </script>
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="IoTNetwork.Pwa.styles.css" rel="stylesheet" />
    <link href="manifest.webmanifest" rel="manifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <div id="pwa-splash" class="pwa-splash" aria-busy="true" aria-live="polite">
            <img src="images/smart-cities-logo.svg" width="128" height="128" alt="Mapas de ciudades inteligentes" />
            <div>
                <h1>Red IoT escolar</h1>
                <p>Instituto Tecnológico de Celaya · Mapas de ciudades inteligentes</p>
            </div>
            <div class="pwa-splash-bar" aria-hidden="true">
                <div class="pwa-splash-bar-fill"></div>
            </div>
        </div>
    </div>

    <script src="js/theme.js"></script>
    <script src="js/pwa-install.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts@3.54.1/dist/apexcharts.min.js"></script>
    <script src="preline/dist/preline.js"></script>
    <script src="js/preline-init.js"></script>
    <script src="js/charts.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="js/map.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.12.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.12.1/firebase-messaging-compat.js"></script>
    <script src="js/fcm.js"></script>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>

</html>
